<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Z01</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="rain-container"></div>
    <div class="glow-overlay"></div>

    <section id="login-page" class="auth-container">
        <h1>ALPHA Z01</h1>
        <div class="glass-card">
            <h2>LOGIN</h2>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
            <p>Tidak punya akun? <span class="link" onclick="showPage('register-page')">Register</span></p>
        </div>
    </section>

    <section id="register-page" class="auth-container" style="display:none;">
        <h1>ALPHA Z01</h1>
        <div class="glass-card">
            <h2>REGISTER</h2>
            <input type="text" id="reg-user" placeholder="Username">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password">
            <button onclick="handleRegister()">Register</button>
            <p>Sudah punya akun? <span class="link" onclick="showPage('login-page')">Login</span></p>
        </div>
    </section>

    <section id="main-page" style="display:none;">
        <header>
            <div class="nav-left">
                <div class="menu-icon" onclick="toggleSidebar()">☰</div>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search TikTok, YouTube, Web...">
                <div class="search-btn" onclick="executeSearch()">🔍</div>
            </div>
        </header>

        <main id="content-area">
            <div class="welcome-msg">
                <h3>Alpha Z01 Engine</h3>
                <p>Silahkan cari sesuatu untuk memulai.</p>
            </div>
            <iframe id="search-frame" src="" frameborder="0" allowfullscreen></iframe>
        </main>

        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>Settings</h3>
                <span class="close-btn" onclick="toggleSidebar()">X</span>
            </div>
            <div class="sidebar-content">
                <div class="feature">
                    <span>Safe Search</span>
                    <label class="switch">
                        <input type="checkbox" id="safesearch-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="feature">
                    <span>VPN Support</span>
                    <span class="status">Active (Universal)</span>
                </div>
                <div class="feature">
                    <span>I-Frame Bypass</span>
                    <span class="status">Enabled</span>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
